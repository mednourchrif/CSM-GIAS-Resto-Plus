name: mobile_app
description: "CSM-GIAS Resto+ - Restaurant Management System"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.6.2

  # Networking
  dio: ^5.7.0

  # Storage
  flutter_secure_storage: ^9.2.4

  # Serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Logging
  logger: ^2.5.0

  # Platform detection
  universal_platform: ^1.1.0

  # Typography
  google_fonts: ^6.2.1

  # Loading skeletons
  shimmer: ^3.0.0

  # QR Scanning
  mobile_scanner: ^5.2.3

  # Share
  share_plus: ^10.1.4

  # Camera
  camera: ^0.11.0

  # Charts
  fl_chart: ^0.70.2
  excel: ^4.0.6
  intl: 0.20.2
  path_provider: ^2.1.5
  pdf: ^3.11.2
  printing: ^5.14.2

  # Face detection (on-device, no recognition)
  google_mlkit_face_detection: ^0.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.6.3
  riverpod_lint: ^2.6.3

flutter:
  uses-material-design: true
