[alembic]
# Path to the Alembic script directory (contains env.py)
script_location = migrations

# The SQLAlchemy URL is configured at runtime in migrations/env.py using
# the application's settings class.  The placeholder below is only used as
# a fallback when running alembic commands outside the application context.
sqlalchemy.url = driver://user:pass@localhost/dbname

# Template used when creating new migration files
file_template = %%(rev)s_%%(slug)s

# Timezone for timestamps in migration files
timezone = UTC

# Logging configuration
log_file = logs/alembic.log

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
